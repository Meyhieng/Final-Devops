<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Template Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2 th:text="${template.id == null ? 'New Template' : 'Edit Template'}">Template Form</h2>
    <form th:action="${template.id == null ? '/templates' : '/templates/' + template.id}" method="post">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Code *</label>
                <input type="text" class="form-control" name="code" th:value="${template.code}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Name *</label>
                <input type="text" class="form-control" name="name" th:value="${template.name}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Organization Name</label>
                <input type="text" class="form-control" name="organizationName" th:value="${template.organizationName}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Layout</label>
                <select class="form-select" name="layout">
                    <option value="VERTICAL" th:selected="${template.layout == 'VERTICAL'}">Vertical</option>
                    <option value="HORIZONTAL" th:selected="${template.layout == 'HORIZONTAL'}">Horizontal</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Primary Color</label>
                <input type="color" class="form-control form-control-color" name="primaryColor"
                       th:value="${template.primaryColor ?: '#1d4ed8'}">
            </div>
            <div class="col-md-4">
                <label class="form-label">Secondary Color</label>
                <input type="color" class="form-control form-control-color" name="secondaryColor"
                       th:value="${template.secondaryColor ?: '#e0e7ff'}">
            </div>
            <div class="col-md-4">
                <label class="form-label">Text Color</label>
                <input type="color" class="form-control form-control-color" name="textColor"
                       th:value="${template.textColor ?: '#111827'}">
            </div>
            <div class="col-md-12">
                <label class="form-label">Tagline</label>
                <input type="text" class="form-control" name="tagline" th:value="${template.tagline}">
            </div>
        </div>
        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="/templates" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
