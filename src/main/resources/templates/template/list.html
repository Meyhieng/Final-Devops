<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Templates</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Card Templates</h2>
        <a href="/templates/new" class="btn btn-primary">+ New Template</a>
    </div>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th><th>Code</th><th>Name</th><th>Organization</th>
                <th>Layout</th><th>Primary Color</th><th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="t : ${templates}">
                <td th:text="${t.id}"></td>
                <td th:text="${t.code}"></td>
                <td th:text="${t.name}"></td>
                <td th:text="${t.organizationName}"></td>
                <td th:text="${t.layout}"></td>
                <td>
                    <span th:style="'background:' + ${t.primaryColor} + ';color:white;padding:2px 10px;border-radius:4px'"
                          th:text="${t.primaryColor}"></span>
                </td>
                <td>
                    <a th:href="@{/templates/{id}/edit(id=${t.id})}" class="btn btn-sm btn-warning">Edit</a>
                    <a th:href="@{/templates/{id}/delete(id=${t.id})}" class="btn btn-sm btn-danger"
                       onclick="return confirm('Delete?')">Delete</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(templates)}">
                <td colspan="7" class="text-center">No templates found</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
