<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profiles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>ID Card Profiles</h2>
        <a href="/profiles/new" class="btn btn-primary">+ New Profile</a>
    </div>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Reg. Number</th>
                <th>Full Name</th>
                <th>Type</th>
                <th>Department</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="profile : ${profiles}">
                <td th:text="${profile.id}"></td>
                <td th:text="${profile.registrationNumber}"></td>
                <td th:text="${profile.fullName}"></td>
                <td th:text="${profile.type}"></td>
                <td th:text="${profile.department}"></td>
                <td>
                    <a th:href="@{/profiles/{id}(id=${profile.id})}" class="btn btn-sm btn-info">View</a>
                    <a th:href="@{/profiles/{id}/edit(id=${profile.id})}" class="btn btn-sm btn-warning">Edit</a>
                    <a th:href="@{/profiles/{id}/preview(id=${profile.id})}" class="btn btn-sm btn-success">Preview</a>
                    <a th:href="@{/profiles/{id}/pdf(id=${profile.id})}" class="btn btn-sm btn-danger">PDF</a>
                    <a th:href="@{/profiles/{id}/delete(id=${profile.id})}" class="btn btn-sm btn-dark"
                       onclick="return confirm('Delete this profile?')">Delete</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(profiles)}">
                <td colspan="6" class="text-center">No profiles found</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
