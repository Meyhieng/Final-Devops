<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Profile Details</h2>
    <div class="card">
        <div class="card-body">
            <table class="table">
                <tr><th>Registration Number</th><td th:text="${profile.registrationNumber}"></td></tr>
                <tr><th>Full Name</th><td th:text="${profile.fullName}"></td></tr>
                <tr><th>Type</th><td th:text="${profile.type}"></td></tr>
                <tr><th>Department</th><td th:text="${profile.department}"></td></tr>
                <tr><th>Title</th><td th:text="${profile.title}"></td></tr>
                <tr><th>Email</th><td th:text="${profile.email}"></td></tr>
                <tr><th>Phone</th><td th:text="${profile.phone}"></td></tr>
                <tr><th>Blood Group</th><td th:text="${profile.bloodGroup}"></td></tr>
                <tr><th>Date of Birth</th><td th:text="${profile.dateOfBirth}"></td></tr>
                <tr><th>Issue Date</th><td th:text="${profile.issueDate}"></td></tr>
                <tr><th>Expiry Date</th><td th:text="${profile.expiryDate}"></td></tr>
            </table>
        </div>
    </div>
    <div class="mt-3">
        <a th:href="@{/profiles/{id}/preview(id=${profile.id})}" class="btn btn-success">Live Preview</a>
        <a th:href="@{/profiles/{id}/pdf(id=${profile.id})}" class="btn btn-danger">Export PDF</a>
        <a th:href="@{/profiles/{id}/edit(id=${profile.id})}" class="btn btn-warning">Edit</a>
        <a href="/profiles" class="btn btn-secondary">Back</a>
    </div>
</div>
</body>
</html>
