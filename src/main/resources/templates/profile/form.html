<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2 th:text="${profile.id == null ? 'New Profile' : 'Edit Profile'}">Profile Form</h2>
    <form th:action="${profile.id == null ? '/profiles' : '/profiles/' + profile.id}"
          method="post" enctype="multipart/form-data">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Full Name *</label>
                <input type="text" class="form-control" name="fullName" th:value="${profile.fullName}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Type *</label>
                <select class="form-select" name="type" required>
                    <option value="">-- Select Type --</option>
                    <option th:each="t : ${profileTypes}" th:value="${t}" th:text="${t}"
                            th:selected="${profile.type == t}"></option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Department</label>
                <input type="text" class="form-control" name="department" th:value="${profile.department}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Title / Program</label>
                <input type="text" class="form-control" name="title" th:value="${profile.title}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" th:value="${profile.email}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Phone</label>
                <input type="text" class="form-control" name="phone" th:value="${profile.phone}">
            </div>
            <div class="col-md-4">
                <label class="form-label">Blood Group</label>
                <input type="text" class="form-control" name="bloodGroup" th:value="${profile.bloodGroup}">
            </div>
            <div class="col-md-4">
                <label class="form-label">Date of Birth</label>
                <input type="date" class="form-control" name="dateOfBirth" th:value="${profile.dateOfBirth}">
            </div>
            <div class="col-md-4">
                <label class="form-label">Expiry Date</label>
                <input type="date" class="form-control" name="expiryDate" th:value="${profile.expiryDate}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Template</label>
                <select class="form-select" name="template.id">
                    <option value="">-- No Template --</option>
                    <option th:each="t : ${templates}" th:value="${t.id}" th:text="${t.name}"
                            th:selected="${profile.template != null && profile.template.id == t.id}"></option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Photo (JPEG/PNG, max 5MB)</label>
                <input type="file" class="form-control" name="photo" accept="image/jpeg,image/png">
            </div>
        </div>
        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="/profiles" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
